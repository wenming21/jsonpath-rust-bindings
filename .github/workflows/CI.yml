  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14", "pypy3.9", "pypy3.10", "pypy3.11" ]
        exclude:
          - platform:
              runner: windows-latest
              target: x86
            python-version: "pypy3.9"
          - platform:
              runner: windows-latest
              target: x86
            python-version: "pypy3.10"
          - platform:
              runner: windows-latest
              target: x86
            python-version: "pypy3.11"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.platform.target }}
          allow-prereleases: true
      - name: Install sccache
        run: cargo install sccache --locked
      - name: Cache cargo dependencies
        uses: actions/cache@v3
        env:
          SCCACHE_DIR: ${{ runner.temp }}/sccache
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: 1
          SCCACHE_CACHE_SIZE: "3G"
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ${{ runner.temp }}/sccache
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Verify sccache
        run: sccache --show-stats
      - name: Set PyPy path
        if: startsWith(matrix.python-version, 'pypy')
        run: echo "PYPY_PATH=$(which ${{ matrix.python-version }}).exe" >> $GITHUB_ENV
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out target/wheels ${{ startsWith(matrix.python-version, 'pypy') && format('-i {0}', env.PYPY_PATH) || format('-i python{0}', matrix.python-version) }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}-${{ startsWith(matrix.python-version, 'pypy') && matrix.python-version || format('py{0}', matrix.python-version) }}
          path: target/wheels

